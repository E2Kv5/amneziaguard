name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      KEYSTORE_STORE_PASSWORD: ${{ secrets.KEYSTORE_STORE_PASSWORD }}
      KEYSTORE_KEY_ALIAS: ${{ secrets.KEYSTORE_KEY_ALIAS }}
      KEYSTORE_KEY_PASSWORD: ${{ secrets.KEYSTORE_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4

      # Signing is optional: if the KEYSTORE_BASE64 secret is set, the release
      # APK is signed; otherwise an unsigned release APK is produced.
      - name: Decode keystore
        if: env.KEYSTORE_BASE64 != ''
        run: |
          mkdir -p keystore
          echo "$KEYSTORE_BASE64" | base64 -d > keystore/amneziaguard-release.jks
          cat > keystore.properties <<EOF
          storeFile=keystore/amneziaguard-release.jks
          storePassword=$KEYSTORE_STORE_PASSWORD
          keyAlias=$KEYSTORE_KEY_ALIAS
          keyPassword=$KEYSTORE_KEY_PASSWORD
          EOF

      - name: Build release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Rename APK
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/release/app-release*.apk "dist/amneziaguard-${GITHUB_REF_NAME#v}.apk"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.apk
          generate_release_notes: true
