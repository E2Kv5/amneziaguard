name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4

      # Signing is optional: if the KEYSTORE_BASE64 secret is set, the release
      # APK is signed; otherwise an unsigned release APK is produced.
      - name: Decode keystore
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore/amneziaguard-release.jks
          cat > keystore.properties <<EOF
          storeFile=keystore/amneziaguard-release.jks
          storePassword=${{ secrets.KEYSTORE_STORE_PASSWORD }}
          keyAlias=${{ secrets.KEYSTORE_KEY_ALIAS }}
          keyPassword=${{ secrets.KEYSTORE_KEY_PASSWORD }}
          EOF

      - name: Build release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Rename APK
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/release/app-release*.apk "dist/amneziaguard-${GITHUB_REF_NAME#v}.apk"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.apk
          generate_release_notes: true
